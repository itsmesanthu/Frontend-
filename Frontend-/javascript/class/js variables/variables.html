<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>variables</title>
</head>
<body>
    <h1>declaration</h1>
    <script>
        let fname
        let num
        fname="tanu"
        num=143
          function name1(){
            // console.log(fname)
            let color="green"
            document.write(color)
            document.write("<br>")
            document.write(fname)
            document.write("<hr>")
        }
        name1()
        console.log(fname)
        document.write(fname)
        document.write("<br>")
        document.write(num)
         document.write("<br>")
        document.write("<hr>")
    </script>
    <h1>intilazition</h1>
        <script>
            const age=21
            var a=true
            let lname=" g r"
            document.write(age)
             document.write("<br>")
            document.write(a)
             document.write("<br>")
            document.write(lname)
             document.write("<br>")
        </script>
        <h2>redeclare and reassign</h2>
        <hr>
       <h3>var</h3>
        <script>
            var name="tanu"
            document.write(name)
            document.write("<br>")
            var name="boss"
            document.write(name)
            document.write("<br>")
        </script>
        <h3>let</h3>
        <script>
            let name="tanu"
            document.write(name)
            document.write("<br>")
            let name="boss"
            document.write(name)
            document.write("<br>")
        </script>
        <h3>const</h3>
        <script>
            const age=22
            document.write(age)
            document.write("<br>")
            const age=21
            document.write(age)
            document.write("<br>")
        </script>

    
</body>
</html>
