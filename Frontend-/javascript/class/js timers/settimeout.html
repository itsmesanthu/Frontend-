<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function sayHello() {
        alert("hello good morning");
        }
        setTimeout(sayHello, 2000); //call the function after 2 seconds`
        function sayHello1() {
            alert("hello good evening");
        }
        setTimeout(sayHello1, 5000); //call the function after 5 seconds
        setTimeout(function () {
            alert("hello good night");
        }, 7000) //call the function after 7 seconds
            </script>
</body>
</html>
