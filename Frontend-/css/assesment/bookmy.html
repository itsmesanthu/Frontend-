<!DOCTYPE html>
<html>
<head>
    <title>BookMyShow Clone</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #94e4f2;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 40px;
            background: #bae0f8;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            color: #f84464;
        }

        .search input {
            width: 420px;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #ddd;
        }

        .right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .location select {
            padding: 6px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }

        .signin {
            background: #f84464;
            color: white;
            padding: 6px 14px;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
        }

        .signin:hover {
            background: #d62c4a;
        }

        .menu {
            font-size: 20px;
        }

        .navbar {
            background: #ffffff;
            padding: 10px 40px;
            display: flex;
            gap: 25px;
            font-size: 14px;
            border-top: 1px solid #eee;
        }

        .navbar a {
            text-decoration: none;
            color: #333;
        }

        .navbar a:hover {
            color: #f84464;
        }

        .banner {
            margin: 20px 40px;
            height: 280px;
            background: url("https://specials.priceless.com/mastercard/images/cf9353d4-e0f5-4ff6-b9a9-9d2517186217.png") no-repeat center;
            background-size: cover;
            border-radius: 10px;
        }

        .section {
            margin: 20px 40px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .section-header h2 {
            margin: 0;
        }

        .see-all {
            color: #f84464;
            font-size: 14px;
            cursor: pointer;
        }

        .movies {
            display: flex;
            gap: 20px;
            margin-top: 15px;
        }

        .card {
            width: 180px;
            transition: transform 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .card img {
            width: 100%;
            height: 250px;
            border-radius: 10px;
        }

        .title {
            font-weight: bold;
            margin-top: 8px;
            font-size: 14px;
        }

        .genre {
            font-size: 13px;
            color: gray;
        }
    </style>
</head>
<body>

<div class="topbar">
    <div class="logo">book<span style="color:black;">my</span>show</div>

    <div class="search">
        <input type="text" placeholder="Search for Movies, Events, Plays, Sports">
    </div>

    <div class="right">
        <div class="location">
            <select>
                <option>Bengaluru</option>
                <option>Mumbai</option>
                <option>Delhi</option>
                <option>Hyderabad</option>
                <option>Chennai</option>
                <option>Kolkata</option>
                <option>Pune</option>
                <option>Ahmedabad</option>
            </select>
        </div>

        <div class="signin">Sign in</div>
        <div class="menu">☰</div>
    </div>
</div>

<div class="navbar">
    <a href="#">Movies</a>
    <a href="#">Stream</a>
    <a href="#">Events</a>
    <a href="#">Plays</a>
    <a href="#">Sports</a>
    <a href="#">Activities</a>
</div>

<div class="banner"></div>

<div class="section">
    <div class="section-header">
        <h2>Recommended Movies</h2>
        <div class="see-all">See All ></div>
    </div>

<div class="movies">

        <div class="card">
            <img src="https://cdn.district.in/movies-assets/images/cinema/Toxic-postger-889bd080-ed1e-11f0-b69f-07304f113f86.jpg">
            <div class="title">Toxic</div>
            <div class="genre">Thriller</div>
        </div>

        <div class="card">
            <img src="https://assets-in.bmscdn.com/iedb/movies/images/mobile/thumbnail/xlarge/love-mocktail-3-et00490658-1773035887.jpg">
            <div class="title">Love Mocktail 3</div>
            <div class="genre">Romance</div>
        </div>

        <div class="card">
            <img src="https://assets-in.bmscdn.com/iedb/movies/images/mobile/thumbnail/xlarge/dhurandhar-the-revenge-et00478890-1772893614.jpg">
            <div class="title">Dhurandhar The Revenge</div>
            <div class="genre">Action</div>
        </div>

        <div class="card">
            <img src="https://assets-in.bmscdn.com/iedb/movies/images/mobile/thumbnail/xlarge/the-super-mario-galaxy-movie-et00465655-1773121810.jpg">
            <div class="title">The Super Mario Galaxy Movie</div>
            <div class="genre">Drama</div>
        </div>

        <div class="card">
            <img src="https://assets-in.bmscdn.com/iedb/movies/images/mobile/thumbnail/xlarge/the-kerala-story-2-goes-beyond-et00484171-1770209319.jpg">
            <div class="title">The Kerala Story 2: Goes Beyond/div>
            <div class="genre">Drama</div>
        </div>
    </div>
</div>

</body>
</html>
