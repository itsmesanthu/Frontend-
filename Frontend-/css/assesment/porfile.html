<!DOCTYPE html>
<html>
<head>
<title>Profile Card</title>

<style>

body{
    background-image: url("image.png");
    background-repeat: no-repeat;
    background-size: cover;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    width:300px;
    backdrop-filter: blur;
    text-align:center;
    border: none;
    border-radius:10px;
    box-shadow:0 40px 100px rgba(2, 2, 2, 0.2);
    padding:20px;
}

.profile-img{
    width:120px;
    height:120px;
    border-radius:50%;
}

h2{
    margin:10px 0;
}

.title{
    color:gray;
    font-size:18px;
}

.info{
    margin-top:15px;
    font-size:14px;
}

button{
    margin-top:15px;
    padding:10px 20px;
    border:burlywood;
    background:#007BFF;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

</style>

</head>

<body>

<div class="card">

<img src="ಮೈ photo -1(139629325826056).jpg" class="profile-img">

<h2>Santhosh</h2>

<p class="title">Web Developer</p>

<div class="info">
<p>Email: santhoshsantthu@email.com</p>
<p>Phone: 8147422441</p>
</div>

<button>Contact</button>

</div>

</body>
</html>
