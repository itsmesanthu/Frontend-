<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .parent{
            width: 400px;
            height: 300px;
            border: 5px solid;
            position: relative;
            left: 500px;
            top: 200px;
        }
        .child{
            height: 150px;
            width: 150px;
            position: absolute;
        }
        #box1{
           background-color: red;
           top: 40px;
           left: 40px;
           z-index: 1;
        }
        #box2{
           background-color: blue;
              top: 80px;
           left: 80px;
           z-index: 2;
        }
        #box3{
            background-color: green;
               top: 120px;
           left: 120px;
           z-index: 3;
        }
    </style>
</head>
<body>
    <div class="parent">
        <div class="child" id="box1"><img src="choota bheem.png" alt=""></div>
     <div class="child" id="box2"><img src="choota bheem.png" alt=""></div>
    <div class="child" id="box3"><img src="choota bheem.png" alt=""></div>
    </div>
</body>
</html>
