<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    *{
      margin: 0;
      padding: 0;
            font-family: cursive;
    }
    header{
      height: 90px;
      width: 100%;
      text-align: center;
      background-color: #3f5d8c;
      padding-top: 5px;
      box-sizing: border-box;
    }
    header h1{

      font-size: 50px;
      color: white;
      text-shadow: 0px 0px 7px black;
    }
    footer{
      text-align: center;
      height: 90px;
      width: 100%;
      background-color: rgb(34, 62, 110);
          padding-top: 30px;
      box-sizing: border-box;
    }
    footer a{
      text-decoration: none;
      color: aliceblue;
      font-size:20px;
      margin: 10px;
    }
    footer a:hover{
      color:orange
    }
    nav{
      height: 50px;
      width: 100%;
      background-color: #98b0d7;
      text-align: center;
    }
    nav a{
      text-decoration: none;
      color: rgb(236, 239, 242);
      font-size:26px;
      margin: 80px;
    }
    nav a:hover{
      text-decoration: underline solid #ffff;
    }
    .hero-section{
      height: 100vh;
      width: 100%;
      background-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTrhmPK4OqfO1UFrCE-NlQIpumTkhXMD9MxyA&s');
    background-repeat: no-repeat;
    background-position: center;
    background-size: cover;
    }
    .content{
      box-sizing: border-box;
      padding-top: 220px;
      padding-left: 51px;
      text-align: center;
    }
    .content h2{
      font-size: 50px;
      color: white;
      text-shadow: 0px 0px 8px blue;
    }
   .content p{
  font-size: larger;
  color: rgb(212, 217, 224);
  font-weight: bolder;
  margin: 15px;
    }
    .exbtn{
      height:50px;
      width: 130px;
      padding: 10px;
      border: none;
      border-radius: 10px;
      box-sizing: border-box;
      background-color: #3f5d8c;
      color: white;
    }
    .exbtn:hover{
      border: 5px solid rgb(91, 134, 207);
      background-color: white;
      color: black;
    }
    .about{
      height: 100vh;
      width: 100%;
      text-align: center;
          background-color: #6796e1;
    }
    .about h2{
      color: aliceblue;
      font-size: 40px;
      font-weight: lighter;
  
    }
  </style>
</head>
<body>
  <header>
    <h1>Product landing page</h1>
  </header>
  <nav>
        <a href="#home">Home</a>
      <a href="#about">About Us</a>
        <a href="#">Contact Us</a>
            <a href="#">Services</a>
      <a href="#">Feedback</a>
  </nav>
  <main>
<div class="hero-section" id="home">
<div class="content">
  <h2>Innovate Your Life with Smart Tech</h2>
<p>Explore our latest range of innovative gadgets and devices.</p>
<button class="exbtn">Explore</button>
</div>
</div>
<div class="about" id="about">
<h2>About us</h2>
</div>
  </main>
  <article>

  </article>
  <footer>
    <a href="#">Instagram</a>
      <a href="#">Facebook</a>
        <a href="#">Twitter</a>
  </footer>
</body>
</html>
