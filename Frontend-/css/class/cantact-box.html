<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
<style>
  .box1{
    width: 300px;
    padding: 200px;
    border: 5px solid black;
    box-sizing: content-box;
    background-color: lightblue;
    margin-bottom: 20px;
  }
  .box2{
        width: 300px;
    padding: 200px;
    border: 5px solid black;
    background-color: lightblue;
    box-sizing: border-box;
    margin-bottom: 20px;
  }
  .btn1{
    width: 100px;
    height: 70px;
    background-color: lightcyan;
    color: blueviolet;
    padding-top: 50px;
    padding-left: 50px;
    box-sizing:content-box;
  }
  .btn2{
       width: 100px;
    height: 70px;
    background-color: lightcyan;
    color: blueviolet;
    padding-left: 50px;
    padding-top: 30px;
    margin-left: 100px;
    box-sizing: border-box;
  }
</style>
</head>
<body>
  <div class="box1">
content Box Example
  </div>
    <div class="box2">
boder Box Example
  </div>
  <button class="btn1">Click</button>
  <button class="btn2">Click</button>
</body>
</html>
