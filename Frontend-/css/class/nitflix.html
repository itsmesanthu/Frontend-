<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Netflix</title>
<style>

body{
color:white;
}

/* Background */

.hero{
height:100vh;
background:url("netfix.jpg");
background-size:cover;
background-position:center;
position:relative;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

/* Dark overlay */

.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
}

/* Header */

header{
position:absolute;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 50px;
z-index:2;
}

.logo{
color:#e50914;
font-size:40px;
font-weight:bold;
}

.header-right{
display:flex;
gap: 10px;
}

.language{
background:transparent;
color:white;
border:1px solid white;
padding:6px 10px;
}

.signin{
background:#e50914;
color:white;
border:none;
padding:8px 16px;
cursor:pointer;
font-weight:bold;
}

/* Content */

.content{
position:relative;
z-index:2;
max-width:700px;
}

.content h1{
font-size:55px;
margin-bottom:20px;
}

.price{
font-size:20px;
margin-bottom:15px;
}

.email-box{
margin-top:20px;
display:flex;
justify-content:center;
gap:10px;
}

.email-box input{
padding:15px;
width:300px;
border:1px solid gray;
background:rgba(0,0,0,0.6);
color:white;
}

.start{
background:#e50914;
color:white;
border:none;
padding:15px 25px;
font-size:18px;
cursor:pointer;
}
</style>
</head>

<body>

<header>
    <h1 class="logo">NETFLIX</h1>
    <div class="header-right">
        <select class="language">
            <option>English</option>
        </select>
        <button class="signin">Sign In</button>
    </div>
</header>

<section class="hero">
<div class="overlay"></div>
<div class="content">
<h1>Unlimited movies,<br>shows, and more</h1>
<p class="price">Starts at ₹149. Cancel at any time.</p>
<p>Ready to watch? Enter your email to create or restart your membership.</p>
<div class="email-box">
<input type="email" placeholder="Email address">
<button class="start">Get Started ></button>
</div>

</div>

</section>

</body>
</html>
