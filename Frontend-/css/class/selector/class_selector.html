<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
                /*class selector*/
        .img1{
            height: 300px;
            width: 400px;
            border: 5px solid red;
        }
        .img2{
            height: 300px;
            width: 400px;
            border: 5px solid rgb(63, 210, 83);
        }
        * Div One */
.one{
    background-color:yellow;
    border:5px solid brown;
}

/* Div Two */
.two{
    height:300px;
    width:300px;
    box-shadow:0px 0px 10px blue;
}

/* Div Three */
.three{
    border:5px solid green;
}

/* Heading */
h3{
    color:purple;
}
    </style>
</head>
<body>
    <h1>class selector</h1>
    <img src="california.jpg" alt="nuture" class="img1">
    <div class="one">
    <h1>Heading One</h1>
    <p>This is a paragraph inside div one.</p>
</div>

<div class="two three">
    <h1>Main Heading</h1>
    <h3>Sub Heading</h3>
</div>

<pre style="font-size:xx-large;">
This is preformatted text
</pre>

<p>This is a normal paragraph.</p>


    <img src="california.jpg" alt="nuture" class="img2">
    
</body>
</html>
