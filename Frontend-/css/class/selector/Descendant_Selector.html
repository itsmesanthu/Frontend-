<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>selector in css</title>
    <style>
        h1{
            color:green;
            font-display: auto;

        }
        h2{
            color: rgb(4, 5, 2);
            font-size: larger;
            background-color: rgb(164, 233, 233);
        }
        h3{
            color: blue;
            font-size: smaller;
            background-color: aquamarine;
        }
        body{
            background-color: rgb(176, 142, 142);
        }
        p{
            color: brown;
        }
    </style>
</head>
<body>
<h1> css selector</h1>
<h2><b>Rakesh</b></h2>
<h3>Tejas</h3>
<p>Lorem ipsum, dolor sit amet consectetur adipisicing elit. Ex,
     eum cumque quae iste incidunt eius illo est et doloribus facere 
     unde itaque eos repellendus rem deserunt sed, atque dolore perferendis.</p>
</body>
</html>
