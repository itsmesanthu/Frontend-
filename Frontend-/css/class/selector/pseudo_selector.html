<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
  <style>
.one:link{
    color: red;
    text-decoration: none;
}
.one:hover{
    color: green;
    text-decoration: underline;
    
}
.two:hover{
    background-color: blue;
    color: white;
    height: 100px;
    width: 200px;
}
.three:hover{
    border: 2px solid red;
    background-color: yellow;
}
.hello{
    height: 200px;
    width: 200px;
    background-color: blue;
}
.hello:hover{
    background-color: purple;
    border-radius: 50%;
}
  </style>
</head>
<body>
<a href="https://www.facebook.com" class="one">
    facebook
</a>
<button class="two">Click me</button>
<input type="text" class="three" placeholder="Enter text">
<div class="hello"></div>
</body>
