<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .parent{
            width: 100%;
            border:10px dashed blue;
            display: flex;
            position:fixed;
            /* top: 100px;
            left: 200px; */
        }
        .child{
            height: 200px;
            width: 200px;
            margin: 10px;
        }
        #box1{
            background-color:green;

        }
        #box2{
            background-color: red;
              position: absolute;
            top: 150px;
            left: 200px;
          
        }
        #box3{
            color: white;
            background-color: black;
              /* position: absolute;
            top: 100px;
            left: 200px; */
            position: relative;
            top: 300px;
            left: 400px;
        }
        #box4{
             background-color:green;

        }
    </style>
</head>
<body>
    <div class="parent">
        <div class="child" id="box1"></div>
            <div class="child" id="box2">absolute</div>
                <div class="child" id="box3">relative</div>
                <div class="child" id="box4"></div>
    </div>
</body>
</html>
