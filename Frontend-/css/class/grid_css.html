<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>grid css</title>
    <style>
        *{
            margin: 10px;
            padding: 0px;
            text-align: center;
            font-family: 'Times New Roman', Times, serif;
        }
        header{
            height: 100px;
            width: 100%;
            justify-items: 40px; ;
            border: 2px solid black;
            text-align: center;
            background-color: gray;
            margin: 10px;
        }
        nav{
            /* height: 50px;
            width: 100%; */
            border: 1px solid black;
            text-align: center;
            background-color: gray;
            margin-bottom: 20px;
        }
        .parent{
             height: 100vh;
            width: 100%; 
            display: grid;
            /* grid-template-rows: 1000px ; */
            grid-template-columns: 500px 100px 100px;
            justify-items: center;
            align-items: center;
            border: 2px solid blue;
            gap: 40px;

        }
        .child{
            border: 2px solid red;
        }
        footer{
            border:2px solid rgb(16, 15, 14);
            background-color: aqua;
        }
    </style>
</head>
<body>
    <header>
        <div>
            <H1>HEADER</H1>
        </div>
    </header>
    <nav>
        <div>nav</div>
    </nav>
    <div class="parent">
        <div class="child"><h3>main</h3></div>
        <div class="child"><h3>aside</h3></div>
        <div class="child"><h3>article</h3></div>
    </div>
    <footer>
        <div><h2>footer</h2></div>
        <img src="" alt="">
    </footer>

</body>
</html>
