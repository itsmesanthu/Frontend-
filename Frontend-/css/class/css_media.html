<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: antiquewhite;
        }
        .box{
            width: 300px;
            height: 300px;
            background-color: red;
            margin: 50px auto;
        }
.box1{
    width: 300px;
    height: 300px;
   background-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQcK8LuTRihbc5t5dlS6Lw6Q710u02oN80LJw&s');
   background-position: center;
   background-size: cover;
    margin: 50px auto;
}
h1{
    text-align: center;
    font-size: 60px;
    color: red;
    text-shadow: 0px 0px 9px black;
}
        /* mobile screen */
        @media(max-width:600px){
            body{
                background-color: aqua;
            }
            .box{
                height: 100px;
                width: 100px;
                background-color: greenyellow;
                border-radius: 10px;
            }
            .box1{
                width: 100px;
                height: 100px;
                background-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRZnRzym8e02IkUP8IrAA-pDccIXAbHpQDMLQ&s');
                background-position: center;
                background-size: cover;
            }
            h1{
                font-family: cursive;
                color: brown;
                font-size: 20px;
            }
        }
        /* laptop screen */
        @media(min-width:768px){
            body{
                background-color: blue;
            }
            .box{
                height: 300px;
                width: 300px;
                background-color: rgb(255, 0, 195);
                border-radius: 50px;
            }
        }
        /* tablet screen */
        @media(min-width:601px) and (max-width:768px){
            body{
                background-color: black;
            }
            .box{
                height: 200px;
                width: 200px;
                background-color: yellow;
                border-radius: 50%;
            }
            .box1{
                width: 200px;
                height: 200px;
                background-image: url('https://technocart.com/cdn/shop/products/WhatsAppImage2023-05-20at3.51.01PM.jpg?v=1685167484');
                background-position: center;
                background-size: cover;
            }
            h1{
                font-family: cursive;
                color: white;
                font-size: 30px;
            }
        }
    </style>
</head>
<body>
      <h1>Welcome to css class</h1>
    <div class="box"></div>
        <div class="box1"></div>
      
</body>
</html>
