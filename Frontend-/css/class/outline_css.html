<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>outline </title>
    <style>
        div{
            height: 200px;
            width: 200px;
            border: 5px solid green;
            outline: 5px dotted red;
        }
        input{
            height: 50px;
            width: 80%;
            border: 5px solid blueviolet;
            outline: 5px dashed hotpink;

        }
        .offset{
            height: 200px;
            width: 200px;
            border: 5px solid green;
            outline: 5px dotted red;
            outline-offset: 30px;
        }
        .hello{
            height: 40px;
            width: 120px;
            border: 5px solid blueviolet;
            outline: 5px dashed hotpink;
            outline-offset: 10px;

        }
        img{
            height: 50px;
            width: 60px;
            border: 5px solid rgb(203, 113, 113);
            border-radius: 30%;
            outline: 5px dotted rebeccapurple;
            outline-offset: 20px;
        }
    </style>
</head>
<body>
    <br><br><br><br>
    <center>
  <div>
    <br><br><br><br>
        <input type="text" placeholder="enter text here">
    </div>
    </center>
    <center>
    <br><br><br><br>
     <div class="offset">
    <br><br><br><br>
        <input type="text" placeholder="enter text here" class="hello">
    </div>
    </center> <br><br><br><br>
    <center>
        <img src="mt15.png" alt="bike">
    </center>
</body>
</html>
