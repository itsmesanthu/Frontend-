<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nested list</title>
</head>
<body>
    
<h2>Nested List</h2>

<ol>
    <li>Chocolates
        <ol class="square">
            <li>Dairy Milk</li>
            <li>Bournville</li>
            <li>Munch</li>
        </ol>
    </li>

    <li>Games
        <ol class="disc">
            <li>Cricket</li>
            <li>Hockey</li>
            <li>Football</li>
        </ol>
    </li>

    <li>Fruit
        <ol class="circle">
            <li>Apple</li>
            <li>Orange</li>
            <li>Grapes</li>
        </ol>
    </li>
</ol>
</body>
</html>
