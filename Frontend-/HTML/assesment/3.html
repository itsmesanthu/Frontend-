<!DOCTYPE html>
<html>
    <head>
        <style>
            .square { list-style-type: square; }
        </style>
    </head>
<body>

<ol type="a">
    <li>Animals
        <ol class="square">
            <li>Mammals
                <ol type="a">
                    <li>Lion</li>
                    <li>Elephant</li>
                    <li>Whale</li>
                </ol>
            </li>
            <li>Reptiles
                <ol class="square">
                    <li>Snake</li>
                    <li>Turtle</li>
                    <li>Crocodile</li>
                </ol>
            </li>
        </ol>
    </li>

    <li>Plants
        <ol class="square">
            <li>Flowering
                <ol type="a">
                    <li>Rose</li>
                    <li>Tulip</li>
                    <li>Sunflower</li>
                </ol>
            </li>
            <li>Non-flowering
                <ol class="square">
                    <li>Fern</li>
                    <li>Moss</li>
                    <li>Algae</li>
                </ol>
            </li>
        </ol>
    </li>
</ol>

</body>
</html>
