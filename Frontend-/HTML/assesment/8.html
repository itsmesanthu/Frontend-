<!DOCTYPE html>
<html>
<head>
    <style>
        .square { list-style-type: square; }
        .disc { list-style-type: disc; }
        .circle { list-style-type: circle; }
    </style>
</head>
<body>

<h2>Nested List</h2>

<ol>
    <li>Chocolates
        <ol class="square">
            <li>Dairy Milk</li>
            <li>Bournville</li>
            <li>Munch</li>
        </ol>
    </li>

    <li>Games
        <ol class="disc">
            <li>Cricket</li>
            <li>Hockey</li>
            <li>Football</li>
        </ol>
    </li>

    <li>Fruit
        <ol class="circle">
            <li>Apple</li>
            <li>Orange</li>
            <li>Grapes</li>
        </ol>
    </li>
</ol>

</body>
</html>
