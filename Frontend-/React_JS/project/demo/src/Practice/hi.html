<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div onmouseover="changeColor(this)"
style="width:150px;height:50px;background:lightblue;">
Move mouse here
</div>
    <div
onmouseover="this.style.background='yellow'"
onmouseout="this.style.background='lightblue'"
style="width:150px;height:50px;background:lightblue;">
Hover Me
</div>
<div onmousemove="showMessage()"
style="width:200px;height:100px;border:1px solid black;">
Move mouse here
</div>

<p id="demo"></p>
<hr>
<input type="text" onkeydown="keyPressed()">
</body>
<script>
function changeColor(element) {
    element.style.backgroundColor = "yellow";
}
function showMessage() {
    document.getElementById("demo").innerHTML = "Mouse is moving!";
}
function keyPressed() {
    console.log("Key Pressed");
}
</script>
</html>
